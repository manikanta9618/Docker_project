<!DOCTYPE html>
<html>
<head>
    <title>Student Admission Management</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        h1 {
            color: #2c3e50;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

<h1>Student Admission Management System</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Joining Date</th>
        <th>Exam Fee Status</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.department }}</td>
        <td>{{ student.joining_date }}</td>
        <td>{{ student.exam_fee }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
